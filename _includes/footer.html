<footer class="site-footer">
  <div class="footer-inner">
    <div>
      <p class="footer-title">{{ site.short_name }} · {{ site.institution }}</p>
      <p class="footer-sub">{{ site.department }}, {{ site.location }}</p>
    </div>
    <div class="footer-links">
      {% if site.email %}<a href="mailto:{{ site.email }}" aria-label="Email"><i class="ti ti-mail"></i></a>{% endif %}
      {% if site.scholar_url %}<a href="{{ site.scholar_url }}" aria-label="Google Scholar"><i class="ti ti-school"></i></a>{% endif %}
      {% if site.github %}<a href="https://github.com/{{ site.github }}" aria-label="GitHub"><i class="ti ti-brand-github"></i></a>{% endif %}
      {% if site.twitter %}<a href="https://x.com/{{ site.twitter }}" aria-label="X"><i class="ti ti-brand-x"></i></a>{% endif %}
    </div>
  </div>
</footer>
